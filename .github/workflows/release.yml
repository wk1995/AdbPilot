name: Build Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  version:
    name: Bump version and tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: v${{ steps.bump.outputs.version }}
      release_sha: ${{ steps.commit.outputs.release_sha }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bump patch version
        id: bump
        run: python packaging/scripts/bump_version.py

      - name: Commit and tag release
        id: commit
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          tag="v$VERSION"

          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add adbpilot/__init__.py pyproject.toml readme.md packaging tests
          git commit -m "chore: release $tag [skip ci]"
          git tag "$tag"
          git push origin HEAD:master
          git push origin "$tag"
          release_sha="$(git rev-parse HEAD)"
          gh release create "$tag" \
            --target "$release_sha" \
            --title "AdbPilot $tag" \
            --notes "Automated desktop release for AdbPilot $VERSION."
          echo "release_sha=$release_sha" >> "$GITHUB_OUTPUT"

  build-windows:
    name: Build Window ${{ matrix.systemos }}-bit
    runs-on: windows-latest
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-architecture: x86
            systemos: "32"
          - python-architecture: x64
            systemos: "64"
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.release_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.python-architecture }}

      - name: Build Windows app
        shell: pwsh
        run: .\packaging\windows\build_windows.ps1 -Mode onedir

      - name: Package Windows app
        shell: pwsh
        env:
          VERSION: ${{ needs.version.outputs.version }}
          SYSTEMOS: ${{ matrix.systemos }}
        run: Compress-Archive -Path dist\AdbPilot -DestinationPath "AdbPilot-window-$env:VERSION-$env:SYSTEMOS.zip" -Force

      - name: Upload Windows release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
          SYSTEMOS: ${{ matrix.systemos }}
        run: |
          $asset = "AdbPilot-window-$env:VERSION-$env:SYSTEMOS.zip"
          for ($attempt = 1; $attempt -le 5; $attempt++) {
            gh release upload $env:TAG $asset --clobber
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }
            Start-Sleep -Seconds 10
          }
          exit $LASTEXITCODE

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: adbpilot-window-${{ needs.version.outputs.version }}-${{ matrix.systemos }}
          path: AdbPilot-window-${{ needs.version.outputs.version }}-${{ matrix.systemos }}.zip

  build-macos:
    name: Build Mac ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            arch: x86_64
            python-architecture: x64
          - os: macos-14
            arch: arm64
            python-architecture: arm64
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.release_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.python-architecture }}

      - name: Build macOS app
        env:
          PYTHON_BIN: python3
        run: bash packaging/macos/build_macos.sh ${{ matrix.arch }}

      - name: Package macOS app
        env:
          VERSION: ${{ needs.version.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: ditto -c -k --sequesterRsrc --keepParent dist/AdbPilot.app "AdbPilot-mac-$VERSION-$ARCH.zip"

      - name: Upload macOS release asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          asset="AdbPilot-mac-$VERSION-$ARCH.zip"
          for attempt in 1 2 3 4 5; do
            if gh release upload "$TAG" "$asset" --clobber; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: adbpilot-mac-${{ needs.version.outputs.version }}-${{ matrix.arch }}
          path: AdbPilot-mac-${{ needs.version.outputs.version }}-${{ matrix.arch }}.zip
