name: Build Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  version:
    name: Bump version and tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: v${{ steps.bump.outputs.version }}
      release_sha: ${{ steps.commit.outputs.release_sha }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bump patch version
        id: bump
        run: python packaging/scripts/bump_version.py

      - name: Commit and tag release
        id: commit
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          tag="v$VERSION"

          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add adbpilot/__init__.py pyproject.toml readme.md packaging tests
          git commit -m "chore: release $tag [skip ci]"
          git tag "$tag"
          git push origin HEAD:master
          git push origin "$tag"
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: version
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.release_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Windows app
        shell: pwsh
        run: .\packaging\windows\build_windows.ps1 -Mode onedir

      - name: Package Windows app
        shell: pwsh
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: Compress-Archive -Path dist\AdbPilot -DestinationPath "AdbPilot-windows-$env:VERSION.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: adbpilot-windows-${{ needs.version.outputs.version }}
          path: AdbPilot-windows-${{ needs.version.outputs.version }}.zip

  build-macos:
    name: Build macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            arch: x86_64
            python-architecture: x64
          - os: macos-14
            arch: arm64
            python-architecture: arm64
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.release_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.python-architecture }}

      - name: Build macOS app
        env:
          PYTHON_BIN: python3
        run: bash packaging/macos/build_macos.sh ${{ matrix.arch }}

      - name: Package macOS app
        env:
          VERSION: ${{ needs.version.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: ditto -c -k --sequesterRsrc --keepParent dist/AdbPilot.app "AdbPilot-macos-$VERSION-$ARCH.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: adbpilot-macos-${{ needs.version.outputs.version }}-${{ matrix.arch }}
          path: AdbPilot-macos-${{ needs.version.outputs.version }}-${{ matrix.arch }}.zip

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - version
      - build-windows
      - build-macos
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Write release manifest
        env:
          VERSION: ${{ needs.version.outputs.version }}
          TAG: ${{ needs.version.outputs.tag }}
          RELEASE_SHA: ${{ needs.version.outputs.release_sha }}
        run: |
          mkdir -p release-manifest
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          files = sorted(str(path) for path in Path("release-artifacts").rglob("*.zip"))
          manifest = {
              "app": "adbpilot",
              "version": os.environ["VERSION"],
              "tag": os.environ["TAG"],
              "commit": os.environ["RELEASE_SHA"],
              "files": [Path(path).name for path in files],
          }
          Path("release-manifest/manifest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload release manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: adbpilot-release-manifest-${{ needs.version.outputs.version }}
          path: release-manifest/manifest.json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find release-artifacts -type f -name '*.zip' | sort)
          gh release create "$TAG" "${files[@]}" \
            --title "AdbPilot $TAG" \
            --notes "Automated desktop release for AdbPilot $VERSION."
